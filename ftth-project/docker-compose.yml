# docker-compose.yml — FTTH Manager
version: '3.8'

services:
  ftth-manager:
    build: .
    container_name: ftth-manager
    ports:
      - "3010:3010"
    volumes:
      # Persistent database (SQLite file)
      - ftth-data:/app/ftth.db
      # Optional: bind mount for backups
      # - ./backups:/app/backups
    environment:
      - NODE_ENV=production
      - PORT=3010
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3010/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - ftth-net

  # Optional: nginx reverse proxy for production
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #   depends_on:
  #     - ftth-manager
  #   networks:
  #     - ftth-net

volumes:
  ftth-data:

networks:
  ftth-net:
    driver: bridge
